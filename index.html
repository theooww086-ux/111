<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎸 孤独摇滚摄影部 · 小孤独 & 山田凉 · 郭牧狄专属 🖤</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Quicksand', 'Comic Neue', 'PingFang SC', '圆体', system-ui, sans-serif;
            min-height: 100vh;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
            background: #fffaf2;
            transition: background-color 0.4s ease;
        }
        /* 主题色变量 */
        :root {
            --theme-primary: #ff9eb5;
            --theme-glow: #ffc0d4;
        }
        .flash-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -4;
            animation: softPastelFlash 0.7s infinite alternate ease-in-out;
        }
        @keyframes softPastelFlash {
            0% { background-color: #fff5e9; }
            25% { background-color: #fce4ec; }
            50% { background-color: #e0f7fa; }
            75% { background-color: #f3e5f5; }
            100% { background-color: #fff0d6; }
        }
        .star-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -3;
        }
        .star {
            position: absolute;
            background: #fff9c4;
            border-radius: 50%;
            box-shadow: 0 0 6px #ffdead;
            opacity: 0.5;
            animation: twinkle 2.5s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            overflow: hidden;
        }
        .float-heart {
            position: absolute;
            bottom: -30px;
            font-size: 1.5rem;
            animation: floatUp linear forwards;
            filter: drop-shadow(0 4px 8px rgba(255, 100, 150, 0.3));
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
        }
        .main-container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
        }
        .character-row {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            background: rgba(255, 245, 235, 0.6);
            backdrop-filter: blur(6px);
            border-radius: 80px;
            padding: 12px 20px;
        }
        .char-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #c07a8c;
            background: #fff9f0;
            padding: 6px 12px;
            border-radius: 40px;
            box-shadow: 0 4px 8px #ffdbdf;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
        }
        .char-card:hover { transform: translateY(-4px); background: #ffeef5; }
        .char-emoji { font-size: 2rem; }
        .hero {
            text-align: center;
            background: rgba(255, 248, 240, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 70px;
            padding: 1rem;
            margin-bottom: 1.2rem;
            border: 2px solid #ffe0f0;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff9eb5, #ffc785);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            gap: 10px;
        }
        .letsgo-area {
            text-align: center;
            margin: 15px 0;
        }
        .btn-letsgo {
            background: #ff9eb5;
            border: none;
            padding: 12px 38px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            box-shadow: 0 6px 0 #b35d74;
            cursor: pointer;
            transition: 0.05s linear;
            display: inline-flex;
            gap: 12px;
        }
        .btn-letsgo:active { transform: translateY(3px); box-shadow: 0 3px 0 #b35d74; }
        .response-text {
            margin-top: 12px;
            font-size: 1.4rem;
            background: #fff0e0cc;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            color: #d47b92;
        }
        .search-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .search-input {
            width: 280px;
            padding: 12px 24px;
            border-radius: 48px;
            border: 2px solid #ffbfcf;
            background: white;
            font-size: 1rem;
            outline: none;
        }
        .search-input:focus { border-color: #ff8aa8; box-shadow: 0 0 0 3px #ffe0e7; }
        .btn-search, .btn-reset, .btn-transition {
            background: #ffe0c4;
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #b55874;
            transition: 0.05s linear;
        }
        .btn-transition { background: #ffd0b5; }
        .btn-search:active, .btn-reset:active, .btn-transition:active { transform: scale(0.96); }
        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin: 30px 0;
        }
        .category-card {
            background: rgba(255, 251, 245, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 38px;
            padding: 1.2rem;
            box-shadow: 0 12px 25px rgba(0,0,0,0.05);
            border: 1px solid #ffe6d5;
        }
        .category-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #e28b9c;
            margin-bottom: 14px;
            border-left: 7px solid #ffb2c7;
            padding-left: 14px;
        }
        .knowledge-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .know-badge {
            background: #fff2e8;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #bc6f84;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #ffe2cf;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .know-badge:hover { background: #ffe2d0; transform: scale(1.02); color: #c23b5e; }
        .learn-btn-sm {
            background: #c0e0c0;
            border: none;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #3f6a3f;
        }
        .flower-garden {
            position: relative;
            min-height: 500px;
            margin: 30px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .flower-card {
            background: linear-gradient(145deg, #fff9ef, #fff0e0);
            border-radius: 60% 40% 50% 50% / 45% 50% 50% 55%;
            width: 220px;
            padding: 20px 12px;
            text-align: center;
            box-shadow: 0 12px 24px rgba(255, 120, 140, 0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            border: 2px solid #ffd9e2;
            backdrop-filter: blur(4px);
            animation: bloom 0.5s ease-out;
        }
        @keyframes bloom {
            0% { transform: scale(0.2) translateY(100px); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .flower-card:hover { transform: translateY(-10px) rotate(2deg); border-color: #ff9eb5; }
        .flower-title { font-size: 1.2rem; font-weight: bold; color: #e0698a; margin-bottom: 8px; }
        .flower-desc { font-size: 0.75rem; color: #a47382; margin: 10px 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .learn-btn {
            background: #c0e0c0;
            border: none;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #3f6a3f;
            cursor: pointer;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .note-effect {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            font-size: 1.8rem;
            animation: noteFloat 1s ease-out forwards;
        }
        @keyframes noteFloat {
            0% { transform: translate(0,0) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--dx, 50px), var(--dy, -100px)) scale(1.5); opacity: 0; }
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 225, 210, 0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: #fffef7;
            max-width: 600px;
            width: 90%;
            border-radius: 56px;
            padding: 28px 24px;
            border: 3px solid #ffc6d9;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { color: #e8829b; font-size: 1.8rem; margin-bottom: 16px; }
        .modal-content p { color: #5a3f49; line-height: 1.6; font-size: 1rem; }
        .related-section { margin-top: 20px; border-top: 2px dashed #ffc0cf; padding-top: 12px; }
        .related-badge {
            background: #ffe4ef;
            border-radius: 24px;
            padding: 4px 12px;
            display: inline-block;
            margin: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .close-modal {
            background: #ffb6c7;
            border: none;
            margin-top: 20px;
            padding: 8px 28px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .notebook {
            background: rgba(255, 248, 235, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 16px 20px;
            margin: 20px 0;
            border: 2px solid #ffd9e2;
        }
        .notebook h3 { color: #e28b9c; font-size: 1.3rem; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .learned-list { display: flex; flex-wrap: wrap; gap: 10px; list-style: none; }
        .learned-item {
            background: #ffeef5;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #a55a72;
        }
        .delete-learned {
            background: none;
            border: none;
            color: #ff8aa8;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }
        .related-tags {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .tag {
            background: #ffe0c4;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #b55874;
            transition: 0.1s;
        }
        .tag:hover { background: #ffd0b5; transform: scale(1.02); }
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 360px;
            min-width: 280px;
            max-width: 500px;
            height: 500px;
            min-height: 350px;
            max-height: 700px;
            border-radius: 32px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.25);
            z-index: 200;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            cursor: default;
        }
        .chat-widget.bocchi-mode { background: #fffaf5; border: 2px solid #ffc0d4; }
        .chat-widget.ryo-mode { background: #0f1722; border: 2px solid #6b4e71; box-shadow: 0 0 15px rgba(75, 0, 130, 0.4); }
        .phone-status {
            background: inherit;
            padding: 6px 12px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            color: #a15d72;
        }
        .chat-header {
            padding: 8px 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }
        .bocchi-mode .chat-header { background: #ffd9e6; color: #bc627b; }
        .ryo-mode .chat-header { background: #1e1a2f; color: #b9a6e0; border-bottom: 1px solid #4a2b5c; }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .mode-switch-btn {
            background: rgba(255,255,200,0.3);
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .bocchi-mode .mode-switch-btn { background: #ffecf0; color: #b3506e; }
        .ryo-mode .mode-switch-btn { background: #332a46; color: #cfb5ff; }
        .window-controls { display: flex; gap: 8px; align-items: center; }
        .ctrl-btn { cursor: pointer; font-size: 1.1rem; padding: 0 4px; user-select: none; }
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .ryo-mode .chat-body { background: #0b0e17; }
        .chat-message {
            border-radius: 20px;
            padding: 8px 14px;
            max-width: 85%;
            font-size: 0.85rem;
            word-break: break-word;
        }
        .bocchi-mode .chat-message.bocchi { background: #ffe4f0; align-self: flex-start; border-bottom-left-radius: 4px; color: #ab6d81; }
        .bocchi-mode .chat-message.user { background: #ffdfc4; align-self: flex-end; border-bottom-right-radius: 4px; color: #735c66; }
        .ryo-mode .chat-message.ryo { background: #1e1a2f; align-self: flex-start; border-bottom-left-radius: 4px; color: #cdb5ff; border-left: 3px solid #a55eff; }
        .ryo-mode .chat-message.user { background: #2a223c; align-self: flex-end; border-bottom-right-radius: 4px; color: #e3d4ff; }
        .chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid;
        }
        .bocchi-mode .chat-input-area { border-color: #ffd9e0; background: #fffbf5; }
        .ryo-mode .chat-input-area { border-color: #332a46; background: #0f0b17; }
        .chat-input {
            flex: 1;
            border-radius: 40px;
            padding: 8px 12px;
            outline: none;
            font-family: inherit;
            background: white;
        }
        .ryo-mode .chat-input { background: #1e1a2f; color: #ddd6ff; border: 1px solid #6b4e71; }
        .chat-send {
            border: none;
            border-radius: 40px;
            margin-left: 8px;
            padding: 0 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .bocchi-mode .chat-send { background: #ffb7c9; color: white; }
        .ryo-mode .chat-send { background: #6a4e9b; color: #e5d5ff; }
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 245, 235, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 180;
            border: 2px solid #ffc0d4;
            flex-wrap: wrap;
            max-width: 320px;
        }
        .music-btn {
            background: #ff9eb5;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .music-status { font-size: 0.75rem; color: #b35d74; }
        iframe.music-frame {
            width: 100%;
            height: 80px;
            border: none;
            border-radius: 20px;
            margin-top: 6px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            color: #bd8797;
            font-size: 0.7rem;
        }
        @media (max-width: 600px) {
            .chat-widget { width: 280px; height: 450px; right: 10px; bottom: 10px; }
            .music-player { left: 10px; bottom: 10px; max-width: 260px; }
        }
    </style>
</head>
<body>
<div class="flash-bg"></div>
<div class="star-bg" id="starBg"></div>
<div class="floating-hearts" id="heartContainer"></div>
<div class="main-container">
    <div class="character-row" id="characterRow">
        <div class="char-card" data-char="bocchi"><span class="char-emoji">🎸🥺</span><span>后藤一里</span></div>
        <div class="char-card" data-char="kita"><span class="char-emoji">🎤🎀</span><span>喜多郁代</span></div>
        <div class="char-card" data-char="nijika"><span class="char-emoji">🥁✨</span><span>伊地知虹夏</span></div>
        <div class="char-card" data-char="ryo"><span class="char-emoji">🎸❄️💀</span><span>山田凉</span></div>
    </div>
    <div class="hero">
        <h1> 🎸 孤独摇滚摄影部 📸  <span>🎀✨💀</span></h1>
        <div class="subhead" style="color:#c97a8e;">郭牧狄同学！和小孤独、喜多、虹夏、凉一起学摄影～ 🥺💖</div>
    </div>
    <div class="letsgo-area">
        <button class="btn-letsgo" id="letsGoBtn">🎸 let's go 🎸</button>
        <div id="responseMessage" class="response-text" style="display: none;"></div>
    </div>
    <div class="search-area">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜索 光圈/构图/景深...">
        <button id="searchBtn" class="btn-search">🔎 搜索</button>
        <button id="resetBtn" class="btn-reset">✨ 全部知识</button>
        <button id="transitionBtn" class="btn-transition">🌸 花海转场</button>
    </div>
    <div class="notebook">
        <h3>📓 我的摄影笔记 <span style="font-size:0.7rem;">(点击知识点的“📝 已学”按钮记录)</span></h3>
        <ul id="learnedList" class="learned-list"></ul>
    </div>
    <div id="knowledgeGrid" class="knowledge-grid"></div>
    <div id="flowerGarden" class="flower-garden" style="display: none;"></div>
    <div class="related-tags" id="relatedTags"></div>
    <footer>📸 摄影知识源自专业体系 · 点击知识点看详细解释 · 与角色自然聊天 🎸</footer>
</div>
<div id="detailModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">📖</h3>
        <div id="modalDesc"></div>
        <div id="relatedContainer" class="related-section"><strong>✨ 关联知识推荐 ✨</strong><br><span id="relatedList"></span></div>
        <button class="close-modal" id="closeModalBtn">わかった！ 关闭</button>
    </div>
</div>
<div class="music-player">
    <span>🎸 结束バンド - 忘れてやらない</span>
    <button id="musicToggleBtn" class="music-btn">▶ 播放</button>
    <span id="musicStatus" class="music-status">点击播放</span>
    <iframe id="neteaseIframe" class="music-frame" src="https://music.163.com/outchain/player?type=2&id=1996320382&auto=0&height=66" allow="autoplay"></iframe>
</div>
<div id="chatWidget" class="chat-widget bocchi-mode">
    <div class="phone-status"><span>📱 18:42</span><span>🔋 100%</span></div>
    <div class="chat-header" id="chatHeader">
        <div class="header-left">
            <span id="charIcon">🎸🥺</span>
            <span id="charName">小孤独 · 后藤一里</span>
            <button id="switchModeBtn" class="mode-switch-btn">⇄ 凉</button>
        </div>
        <div class="window-controls">
            <span class="ctrl-btn" id="minimizeChatBtn" title="最小化">─</span>
            <span class="ctrl-btn" id="closeChatBtn" title="关闭">✕</span>
        </div>
    </div>
    <div id="chatBody" class="chat-body"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="和角色聊天..." autocomplete="off">
        <button id="chatSendBtn" class="chat-send">发送</button>
    </div>
</div>
<script>
    // ========== 完整摄影知识库 (九大类，每个知识点超详细) ==========
    const KNOWLEDGE_CATEGORIES = [
        { name: "🎛️ 技术控制类", items: ["曝光三要素","直方图判读","对焦模式选择","白平衡校准","文件格式选择","安全快门/焦距","测光与曝光"] },
        { name: "🔭 光学与硬件特性类", items: ["景深控制原理","焦段表达","眩光与鬼影应对","后背胶片认知","传感器影响"] },
        { name: "📐 构图几何学类", items: ["点线面构成原则","形状与负空间运用","视觉重量平衡法则"] },
        { name: "💡 光影类", items: ["光的方向性","光的质量与心理映射","光比控制与氛围"] },
        { name: "🎨 色彩科学类", items: ["色相明度关系应用","色温三要素"] },
        { name: "📸 画面内容与瞬间类", items: ["决定性瞬间捕捉","非决定性瞬间价值","符号学元素运用","对比构建"] },

    const DETAILS = {

    function getRelatedItems(currentTerm) {
        let related = [];

                related.push(item);
                if(related.length>=3) break;
            }

        if(related.length<3) related = fullItems.filter(i=>i.term!==currentTerm).slice(0,3);
        return related;

    function playTypeSound() {
        try { let ctx = new (window.AudioContext||window.webkitAudioContext)(); let osc = ctx.createOscillator(); let gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value=1500; gain.gain.value=0.04; osc.type='sine'; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime+0.15); osc.stop(ctx.currentTime+0.15); } catch(e){} }
    async function typeMessage(element, text, speed=28) {
        element.innerText = '';
        for(let ch of text) { element.innerText += ch; if(ch!==' ') playTypeSound(); await new Promise(r=>setTimeout(r,speed)); }
    }

    function getRandom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
    async function generateReply(query) {
        const lower = query.toLowerCase();
        if(lower.includes("你好")||lower.includes("嗨")||lower.includes("您好")) return currentMode==='bocchi'?getRandom(bocchiReplies.greet):getRandom(ryoReplies.greet);
        if(lower.includes("怎么样")||lower.includes("好吗")||lower.includes("心情")) return currentMode==='bocchi'?getRandom(bocchiReplies.how):getRandom(ryoReplies.how);
        let found = fullItems.find(it => lower.includes(it.term.toLowerCase()) || (lower.includes("曝光")&&it.term.includes("曝光")) || (lower.includes("光圈")&&it.term.includes("光圈")));
        if(found) return currentMode==='bocchi'?bocchiReplies.photography(found.term):ryoReplies.photography(found.term);
        if(lower.includes("摇滚")||lower.includes("音乐")||lower.includes("吉他")||lower.includes("贝斯")||lower.includes("歌")) return currentMode==='bocchi'?getRandom(bocchiReplies.rock):getRandom(ryoReplies.rock);
        if(lower.includes("电影")) return currentMode==='bocchi'?getRandom(bocchiReplies.movie):getRandom(ryoReplies.movie);

    // 拖拽移动 + 右下角拉伸
    let dragActive = false, dragStartX, dragStartY, startLeft, startTop;
    widget.querySelector('.chat-header').addEventListener('mousedown', (e) => {
        if(e.target.closest('.window-controls')) return;
        dragActive = true;
        dragStartX = e.clientX; dragStartY = e.clientY;
        let rect = widget.getBoundingClientRect();
        startLeft = rect.left; startTop = rect.top;
        widget.style.cursor = 'grabbing';
        e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
        if(dragActive) {
            let dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
            widget.style.left = (startLeft + dx) + 'px';
            widget.style.top = (startTop + dy) + 'px';
            widget.style.right = 'auto'; widget.style.bottom = 'auto';
        }
    });
    window.addEventListener('mouseup', () => { dragActive = false; widget.style.cursor = ''; });
    let resizeActive = false;
    function startResize(e) { resizeActive = true; e.preventDefault(); }
    function doResize(e) {
        if(!resizeActive) return;
        let rect = widget.getBoundingClientRect();
        let newW = e.clientX - rect.left;
        let newH = e.clientY - rect.top;
        if(newW > 260) widget.style.width = newW + 'px';
        if(newH > 350) widget.style.height = newH + 'px';
    }
    function stopResize() { resizeActive = false; }
    widget.addEventListener('mousemove', (e) => {
        let rect = widget.getBoundingClientRect();
        let isRightBottom = (e.clientX >= rect.right - 15 && e.clientY >= rect.bottom - 15);
        widget.style.cursor = isRightBottom ? 'nw-resize' : 'default';
    });
    widget.addEventListener('mousedown', (e) => {
        let rect = widget.getBoundingClientRect();
        if(e.clientX >= rect.right - 15 && e.clientY >= rect.bottom - 15) startResize(e);
    });
    window.addEventListener('mousemove', doResize);
    window.addEventListener('mouseup', stopResize);
    bocchiMessages = [{ text:"🥺 郭牧狄同学！欢迎来到摄影部～ 喜多、虹夏、凉也都在哦！🎸💖", isUser:false },{ text:"✨ 想问摄影知识或聊聊摇滚电影都可以！(｡•ᴗ•｡)", isUser:false }];
    ryoMessages = [{ text:"……郭牧狄。摄影和贝斯一样，需要孤独的专注。 💀🎸", isUser:false },{ text:"骷髅很美。光圈优先？我更喜欢暗调。", isUser:false }];
    renderChatHistory();
    // 角色主题切换
    const themes = {
        bocchi: { bg:'#fff0f5', hearts:['❤️','💖','🎸','⭐️'], accent:'#ff9eb5' },
        kita: { bg:'#ffe6f0', hearts:['🎤','🎀','🌸','💗'], accent:'#ffb7c5' },
        nijika: { bg:'#fff3e0', hearts:['🥁','✨','⭐️','💛'], accent:'#ffd966' },
        ryo: { bg:'#e6e6fa', hearts:['💀','🎸','🖤','❄️'], accent:'#b0a0e0' }
    };
    function setTheme(character) {
        const t = themes[character];
        document.body.style.backgroundColor = t.bg;
        document.documentElement.style.setProperty('--theme-primary', t.accent);
        window.currentHeartIcons = t.hearts;
        document.querySelectorAll('.char-card').forEach(card => {
            if(card.dataset.char === character) card.style.background = '#ffe5f0';
            else card.style.background = '#fff9f0';
        });
    }
    document.querySelectorAll('.char-card').forEach(card => {
        card.addEventListener('click', () => setTheme(card.dataset.char));
    });
    setTheme('bocchi');
    window.currentHeartIcons = themes.bocchi.hearts;
    setInterval(() => {
        let icons = window.currentHeartIcons || ['❤️','💖','🎸','⭐️'];
        let c = document.getElementById('heartContainer');
        let h = document.createElement('div'); h.classList.add('float-heart');
        h.innerText = icons[Math.floor(Math.random()*icons.length)];
        h.style.fontSize = (Math.random()*1.5+1.2)+'rem';
        h.style.left = Math.random()*100+'%';
        h.style.animationDuration = (Math.random()*4+3)+'s';
        c.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    }, 500);
    // lets go 随机台词
    const charLines = [
        { char:'bocchi', text:'🎸 小孤独：呜哇...郭同学按了按钮！一起拍出最棒的照片吧！🥺💖', color:'#ff9eb5' },
        { char:'kita', text:'🎤 喜多郁代：耶～！郭牧狄同学！让我们用照片传递笑容吧！🎀✨', color:'#ffb7c5' },
        { char:'nijika', text:'🥁 伊地知虹夏：大家集合！郭同学，摄影和打鼓一样，节奏很重要哦！🌟', color:'#ffd966' },
        { char:'ryo', text:'💀 山田凉：……按下去了。那就用贝斯和快门，记录孤独的瞬间。', color:'#b0a0e0' }
    ];
    let lineIndex = 0;
    document.getElementById('letsGoBtn').addEventListener('click', () => {
        burstExplode();
        const line = charLines[lineIndex % charLines.length];
        const respDiv = document.getElementById('responseMessage');
        respDiv.style.display = 'inline-block';
        respDiv.style.color = line.color;
        respDiv.innerHTML = line.text;
        lineIndex++;
        setTimeout(()=>respDiv.style.opacity='0.9',2000);
        addChatMessageWithTyping(line.text.replace(/^[^:]+：/,''), false);
    });
    function initStars(){ let sc=document.getElementById('starBg'); for(let i=0;i<90;i++){ let s=document.createElement('div'); s.classList.add('star'); let sz=Math.random()*5+2; s.style.width=sz+'px'; s.style.height=sz+'px'; s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%'; s.style.animationDelay=Math.random()*2+'s'; sc.appendChild(s); } }
    function burstExplode(){ let div=document.createElement('div'); div.style.cssText='position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999'; document.body.appendChild(div); let icons=['❤️','💖','🎸','⭐️','💗','🎸']; for(let i=0;i<70;i++){ let it=document.createElement('div'); it.innerText=icons[Math.floor(Math.random()*icons.length)]; it.style.position='absolute'; it.style.fontSize=(Math.random()*28+18)+'px'; it.style.left=window.innerWidth/2+(Math.random()-0.5)*280+'px'; it.style.top=window.innerHeight/2+(Math.random()-0.5)*180+'px'; it.style.animation='burstFly 0.8s ease-out forwards'; let dx=(Math.random()-0.5)*260, dy=(Math.random()-0.8)*260-80; it.style.setProperty('--dx',dx+'px'); it.style.setProperty('--dy',dy+'px'); div.appendChild(it); } let style=document.createElement('style'); style.textContent=`@keyframes burstFly{0%{transform:translate(0,0) scale(0.4); opacity:1;}100%{transform:translate(var(--dx,80px), var(--dy,-200px)) scale(1.2); opacity:0;}}`; document.head.appendChild(style); setTimeout(()=>div.remove(),1000); }
    const musicBtn = document.getElementById('musicToggleBtn');
    const musicIframe = document.getElementById('neteaseIframe');
    let musicPlaying = false;
    musicBtn.addEventListener('click', () => {
        if(!musicPlaying) {
            musicIframe.src = musicIframe.src + "&auto=1";
            musicPlaying = true;
            musicBtn.innerText = '⏸ 暂停';
            document.getElementById('musicStatus').innerText = '🎵 播放中: 忘れてやらない';
        } else {
            musicIframe.src = musicIframe.src.replace("&auto=1", "");
            musicPlaying = false;
            musicBtn.innerText = '▶ 播放';
            document.getElementById('musicStatus').innerText = '已暂停';
        }
    });
    initStars();
    renderGrid();
    renderRelatedTags();
    document.getElementById('transitionBtn').addEventListener('click', transitionToFlower);
    document.getElementById('resetBtn').addEventListener('click', () => { document.getElementById('searchInput').value = ''; if(currentView==='grid') renderGrid(); else renderFlowerGarden(); renderRelatedTags(); });
    document.getElementById('searchBtn').addEventListener('click', () => searchKnowledge(document.getElementById('searchInput').value));
    document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key==='Enter') searchKnowledge(e.target.value); });
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('detailModal').classList.remove('active');
    document.getElementById('detailModal').addEventListener('click', (e) => { if(e.target === document.getElementById('detailModal')) document.getElementById('detailModal').classList.remove('active'); });
</script>
</body>
</html>
